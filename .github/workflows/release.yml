name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type (auto = infer from commits)"
        required: false
        default: "auto"
        type: choice
        options: [auto, patch, minor, major]
      dry_run:
        description: "Dry run — simulate bump without committing or pushing"
        required: false
        default: false
        type: boolean

jobs:
  bump:
    name: Bump version & push tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.bump.outputs.version }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          allow-prereleases: true

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Generate coverage badge
        run: |
          uv run pytest --cov=fusion --cov-report=xml -q
          python - <<'EOF'
          import xml.etree.ElementTree as ET
          pct = round(float(ET.parse("coverage.xml").getroot().get("line-rate")) * 100, 1)
          color = "brightgreen" if pct >= 90 else "yellow" if pct >= 75 else "red"
          label, value = "coverage", f"{pct}%"
          lw, vw = 62, len(value) * 7 + 10
          w = lw + vw
          svg = f"""<svg xmlns="http://www.w3.org/2000/svg" width="{w}" height="20">
            <linearGradient id="s" x2="0" y2="100%"><stop offset="0" stop-color="#bbb" stop-opacity=".1"/><stop offset="1" stop-opacity=".1"/></linearGradient>
            <rect rx="3" width="{w}" height="20" fill="#555"/>
            <rect rx="3" x="{lw}" width="{vw}" height="20" fill="{color}"/>
            <rect rx="3" width="{w}" height="20" fill="url(#s)"/>
            <g fill="#fff" text-anchor="middle" font-family="DejaVu Sans,Verdana,Geneva,sans-serif" font-size="11">
              <text x="{lw//2}" y="15" fill="#010101" fill-opacity=".3">{label}</text>
              <text x="{lw//2}" y="14">{label}</text>
              <text x="{lw + vw//2}" y="15" fill="#010101" fill-opacity=".3">{value}</text>
              <text x="{lw + vw//2}" y="14">{value}</text>
            </g>
          </svg>"""
          open("coverage.svg", "w").write(svg)
          print(f"Coverage badge generated: {pct}%")
          EOF

      - name: Bump version
        id: bump
        run: |
          DRY_RUN=${{ inputs.dry_run == true && '--dry-run' || '' }}
          PREV_TAG="v$(uv run cz version --project)"
          if git rev-parse "$PREV_TAG" >/dev/null 2>&1; then
            CHANGELOG="--changelog"
          else
            CHANGELOG=""
          fi
          if [ "${{ inputs.bump }}" = "auto" ]; then
            uv run cz bump --yes $CHANGELOG $DRY_RUN
          else
            uv run cz bump --increment ${{ inputs.bump }} --yes $CHANGELOG $DRY_RUN
          fi
          echo "version=$(uv run cz version --project)" >> "$GITHUB_OUTPUT"

      - name: Commit coverage badge
        if: ${{ inputs.dry_run != true }}
        run: |
          git add coverage.svg
          git diff --cached --quiet || git commit -m "chore: update coverage badge"

      - name: Push tag and changelog
        if: ${{ inputs.dry_run != true }}
        run: git push --follow-tags

  build:
    name: Build distributions
    needs: bump
    if: ${{ inputs.dry_run != true }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          allow-prereleases: true

      - name: Build distributions
        run: |
          python -m pip install build
          python -m build

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: release-dists
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/p/fusion

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: release-dists
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
