name: PR title check

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

jobs:
  check:
    name: Conventional commit format
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            chore
            test
            docs
            refactor
            ci
            perf
            style
          requireScope: false
